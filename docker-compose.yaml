services:
  pathfinding-3d:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathfinding-3d
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
